version: '3.8'

services:
  db:
    image: mysql:8
    container_name: beatflow_db_container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: beatflow_dev
      MYSQL_ROOT_PASSWORD: root_secure_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
